<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Wissal 💖</title>
<style>
body {
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
}
.container {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.2);
    padding: 40px;
    border-radius: 20px;
}
h1 {
    font-size: 2.5em;
    color: white;
}
button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    background: #ff4b5c;
    color: white;
    cursor: pointer;
}
#player {
    display: none;
}
iframe {
    width: 0;
    height: 0;
    border: 0;
}
.falling-heart {
    position: absolute;
    top: -10px;
    font-size: 22px;
    animation: fall linear infinite;
    opacity: 0.8;
}
@keyframes fall {
    to { transform: translateY(110vh);}
}
</style>
</head>
<body>

<script>
for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.className = "falling-heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(heart);
}
function playMusic() {
    document.getElementById("player").style.display = "block";
}
</script>

<div class="container">
    <h1>wissal eres la mejor te lo juro</h1>

    <button onclick="playMusic()">
        💖 dale aqui mi amor 💖
    </button>

    <div id="player">
        <iframe 
          src="https://www.youtube.com/embed/JLd09jmEAYA?autoplay=1"
          allow="autoplay"
        ></iframe>
    </div>
</div>

</body>
</html>
